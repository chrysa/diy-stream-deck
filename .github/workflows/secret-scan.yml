true:
  pull_request:
    branches:
    - develop
    - main
    - master
  push:
    branches:
    - develop
    - feat/**
    - feature/**
    - fix/**
    - main
    - release/**
jobs:
  gitleaks:
    name: Detect secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      uses: gitleaks/gitleaks-action@v2
name: Secret scan
permissions:
  contents: read
