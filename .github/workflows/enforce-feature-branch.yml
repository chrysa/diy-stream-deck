true:
  pull_request:
    types:
    - opened
    - ready_for_review
    - reopened
    - synchronize
jobs:
  branch-policy:
    runs-on: ubuntu-latest
    steps:
    - env:
        BRANCH_NAME: ${{ github.head_ref }}
      name: Validate PR source branch naming
      run: "branch=\"$BRANCH_NAME\"\nif [[ \"$branch\" == dependabot/* ]]; then\n\
        \  echo \"Dependabot branch \u2014 policy check skipped\"\n  exit 0\nfi\n\
        pattern='^(feature|fix|chore|docs|refactor|test|ci|build|perf|hotfix)/[a-z0-9._-]+$'\n\
        if [[ ! \"$branch\" =~ $pattern ]]; then\n  echo \"Invalid branch name: $branch\"\
        \n  echo \"Expected: type/short-description (e.g. feature/add-auth-flow)\"\
        \n  exit 1\nfi\n"
      shell: bash
name: Enforce Feature Branch Policy
