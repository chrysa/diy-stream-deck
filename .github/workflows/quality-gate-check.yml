true:
  pull_request:
    branches:
    - develop
    - main
    - master
    types:
    - opened
    - reopened
    - synchronize
  push:
    branches:
    - main
    - master
jobs:
  quality-gate:
    name: No-Regression Quality Gates
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - continue-on-error: true
      name: Set up Node.js (if needed)
      uses: actions/setup-node@v6
      with:
        cache: npm
        node-version: '20'
    - name: Install dependencies
      run: 'if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

        if [ -f package.json ]; then npm ci; fi

        '
    - id: quality-gate
      name: Run quality gate verification
      run: "if [ ! -f .quality-gate-baseline.json ]; then\n  echo \"\u2139\uFE0F No\
        \ baseline found \u2014 skipping quality gate (run quality-gate-baseline on\
        \ main first)\"\n  exit 0\nfi\nmake quality-gate-verify || exit_code=$?\n\
        exit \"${exit_code:-0}\"\n"
    - if: always()
      name: Report quality gate status
      run: "if [ ${{ steps.quality-gate.outcome }} == 'success' ]; then\n  echo \"\
        \u2705 All quality gates passed\"\n  exit 0\nelse\n  echo \"\u274C Quality\
        \ gate regression detected\"\n  exit 1\nfi\n"
    - env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OUTCOME: ${{ steps.quality-gate.outcome }}
        REPO: ${{ github.repository }}
        SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      if: always()
      name: Set quality-gate commit status
      run: "STATE=\"success\"\nDESCRIPTION=\"All quality gates passed\"\nif [ \"$OUTCOME\"\
        \ != \"success\" ]; then\n  STATE=\"failure\"\n  DESCRIPTION=\"Quality gate\
        \ regression detected\"\nfi\ngh api \"repos/${REPO}/statuses/${SHA}\" \\\n\
        \  -f state=\"${STATE}\" \\\n  -f context=\"quality-gate\" \\\n  -f description=\"\
        ${DESCRIPTION}\"\n"
name: Quality Gate Check
permissions:
  checks: write
  contents: read
  statuses: write
